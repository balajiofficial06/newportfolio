<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&family=JetBrains+Mono:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg-deep: #050508;
                --card-base: #0c0c12;
                --neon-primary: #00f2ff;
                --neon-secondary: #7000ff;
                --neon-accent: #ff00c1;
                --font-main: "Inter", sans-serif;
                --font-mono: "JetBrains Mono", monospace;
                --transition-smooth: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-color: var(--bg-deep);
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                gap: 40px;
                flex-wrap: wrap;
                overflow: hidden;
                padding: 20px;
            }

            .skill-container {
                position: relative;
                width: 320px;
                height: 440px;
                background: var(--card-base);
                border-radius: 24px;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                cursor: pointer;
                transition: var(--transition-smooth);
            }

            /* The Viscous Current - Background Layer */
            .skill-container::before {
                content: "";
                position: absolute;
                width: 150%;
                height: 150%;
                background: conic-gradient(
                    from 0deg,
                    transparent 0%,
                    var(--neon-primary) 15%,
                    var(--neon-secondary) 30%,
                    var(--neon-accent) 45%,
                    transparent 60%
                );
                animation: rotateCurrent 4s linear infinite;
            }

            /* The Glow - Soft Secondary Layer */
            .skill-container::after {
                content: "";
                position: absolute;
                inset: 4px;
                background: var(--card-base);
                border-radius: 20px;
                z-index: 1;
            }

            /* Hover Intensification */
            .skill-container:hover {
                transform: translateY(-10px) scale(1.02);
                box-shadow: 0 0 50px rgba(112, 0, 255, 0.3);
            }

            .skill-container:hover::before {
                animation-duration: 2s;
            }

            /* Content Layer */
            .card-inner {
                position: relative;
                z-index: 2;
                width: 100%;
                height: 100%;
                padding: 40px 30px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                background: rgba(12, 12, 18, 0.8);
                backdrop-filter: blur(10px);
                border-radius: 20px;
            }

            .skill-header {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .skill-tag {
                font-family: var(--font-mono);
                font-size: 10px;
                text-transform: uppercase;
                letter-spacing: 0.2em;
                color: var(--neon-primary);
                opacity: 0.8;
                border: 1px solid rgba(0, 242, 255, 0.3);
                width: fit-content;
                padding: 4px 12px;
                border-radius: 100px;
            }

            .skill-title {
                font-family: var(--font-main);
                font-weight: 800;
                font-size: 38px;
                line-height: 1.1;
                color: #ffffff;
                letter-spacing: -0.04em;
            }

            .skill-body {
                flex-grow: 1;
                display: flex;
                align-items: flex-end;
            }

            .data-grid {
                width: 100%;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }

            .data-point {
                display: flex;
                flex-direction: column;
                gap: 4px;
            }

            .label {
                font-family: var(--font-mono);
                font-size: 9px;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.4);
                letter-spacing: 0.1em;
            }

            .value {
                font-family: var(--font-mono);
                font-size: 16px;
                font-weight: 700;
                color: #fff;
            }

            .progress-bar-wrap {
                width: 100%;
                height: 4px;
                background: rgba(255, 255, 255, 0.05);
                margin-top: 20px;
                border-radius: 2px;
                overflow: hidden;
                position: relative;
            }

            .progress-fill {
                height: 100%;
                background: linear-gradient(
                    90deg,
                    var(--neon-primary),
                    var(--neon-secondary)
                );
                width: 0%;
                transition: width 1.5s cubic-bezier(0.65, 0, 0.35, 1);
            }

            .skill-container:hover .progress-fill {
                width: var(--skill-level);
            }

            @keyframes rotateCurrent {
                from {
                    transform: rotate(0deg);
                }
                to {
                    transform: rotate(360deg);
                }
            }

            /* Ambient Bloom effect behind the card */
            .bloom {
                position: absolute;
                width: 200px;
                height: 200px;
                background: var(--neon-secondary);
                filter: blur(120px);
                opacity: 0.15;
                pointer-events: none;
                z-index: -1;
            }
        </style>
    </head>
    <body>
        <div class="bloom"></div>

        <!-- Skill Card 1 -->
        <div class="skill-container" style="--skill-level: 85%">
            <div class="card-inner">
                <div class="skill-header">
                    <span class="skill-tag">Engine v.4.2</span>
                    <h2 class="skill-title">NEURAL<br />FLUX</h2>
                </div>

                <div class="skill-body">
                    <div class="data-grid">
                        <div class="data-point">
                            <span class="label">Purity</span>
                            <span class="value">98.2%</span>
                        </div>
                        <div class="data-point">
                            <span class="label">Latency</span>
                            <span class="value">12ms</span>
                        </div>
                        <div
                            class="progress-bar-wrap"
                            style="grid-column: span 2"
                        >
                            <div class="progress-fill"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Skill Card 2 -->
        <div class="skill-container" style="--skill-level: 92%">
            <div class="card-inner">
                <div class="skill-header">
                    <span class="skill-tag">Interface v.1.0</span>
                    <h2 class="skill-title">PLASMA<br />GRID</h2>
                </div>

                <div class="skill-body">
                    <div class="data-grid">
                        <div class="data-point">
                            <span class="label">Stability</span>
                            <span class="value">CRITICAL</span>
                        </div>
                        <div class="data-point">
                            <span class="label">Output</span>
                            <span class="value">4.2GW</span>
                        </div>
                        <div
                            class="progress-bar-wrap"
                            style="grid-column: span 2"
                        >
                            <div class="progress-fill"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // Optional: Adding subtle parallax or tilt effect for that extra "viscous" tactile feel
            const cards = document.querySelectorAll(".skill-container");

            cards.forEach((card) => {
                card.addEventListener("mousemove", (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;

                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;

                    const rotateX = (y - centerY) / 15;
                    const rotateY = (centerX - x) / 15;

                    card.style.transform = `perspective(1000px) translateY(-10px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
                });

                card.addEventListener("mouseleave", () => {
                    card.style.transform = `perspective(1000px) translateY(0) rotateX(0deg) rotateY(0deg) scale(1)`;
                });
            });
        </script>
    </body>
</html>
