<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@300;500&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg-deep: #050505;
                --neon-cyan: #00f3ff;
                --neon-flux: #7000ff;
                --glass: rgba(255, 255, 255, 0.03);
                --glass-stroke: rgba(255, 255, 255, 0.1);
                --text-main: #ffffff;
                --text-dim: rgba(255, 255, 255, 0.5);
                --font-sans: "Inter", sans-serif;
                --font-mono: "JetBrains Mono", monospace;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                -webkit-font-smoothing: antialiased;
            }

            body {
                background-color: var(--bg-deep);
                color: var(--text-main);
                font-family: var(--font-sans);
                overflow-x: hidden;
            }

            .flux-container {
                position: relative;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 80px 20px;
                overflow: hidden;
            }

            /* Conductive Background Elements */
            .flux-bg-gradient {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 150%;
                height: 150%;
                background:
                    radial-gradient(
                        circle at center,
                        rgba(112, 0, 255, 0.08) 0%,
                        transparent 50%
                    ),
                    radial-gradient(
                        circle at 20% 30%,
                        rgba(0, 243, 255, 0.05) 0%,
                        transparent 40%
                    );
                z-index: 0;
                pointer-events: none;
                animation: drift 20s ease-in-out infinite alternate;
            }

            @keyframes drift {
                from {
                    transform: translate(-50%, -50%) rotate(0deg);
                }
                to {
                    transform: translate(-45%, -55%) rotate(5deg);
                }
            }

            .grain-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: 10;
                opacity: 0.4;
                mix-blend-mode: overlay;
            }

            /* Main Layout */
            .contact-grid {
                position: relative;
                z-index: 2;
                display: grid;
                grid-template-columns: 1fr 1.2fr;
                gap: 100px;
                max-width: 1200px;
                width: 100%;
            }

            @media (max-width: 1024px) {
                .contact-grid {
                    grid-template-columns: 1fr;
                    gap: 60px;
                }
            }

            /* Typography & Header */
            .contact-header h2 {
                font-size: clamp(3rem, 8vw, 6rem);
                font-weight: 900;
                line-height: 0.9;
                letter-spacing: -0.04em;
                margin-bottom: 40px;
                text-transform: uppercase;
            }

            .contact-header h2 span {
                display: block;
                color: transparent;
                -webkit-text-stroke: 1px var(--glass-stroke);
            }

            .info-block {
                margin-top: 60px;
            }

            .info-item {
                margin-bottom: 32px;
                opacity: 0;
                transform: translateY(20px);
                animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }

            .info-item:nth-child(2) {
                animation-delay: 0.1s;
            }
            .info-item:nth-child(3) {
                animation-delay: 0.2s;
            }

            .info-label {
                font-family: var(--font-mono);
                font-size: 12px;
                text-transform: uppercase;
                color: var(--neon-cyan);
                letter-spacing: 0.2em;
                margin-bottom: 8px;
                display: block;
            }

            .info-value {
                font-size: 20px;
                font-weight: 400;
                color: var(--text-main);
                text-decoration: none;
                transition: color 0.3s ease;
            }

            .info-value:hover {
                color: var(--neon-cyan);
            }

            /* Vitreous Form */
            .contact-form-container {
                position: relative;
                padding: 2px; /* For the conductive border effect */
                background: linear-gradient(
                    135deg,
                    var(--glass-stroke),
                    transparent
                );
                border-radius: 24px;
            }

            .contact-form {
                background: rgba(10, 10, 10, 0.8);
                backdrop-filter: blur(40px);
                -webkit-backdrop-filter: blur(40px);
                padding: 60px;
                border-radius: 22px;
                display: flex;
                flex-direction: column;
                gap: 40px;
            }

            .form-group {
                position: relative;
                display: flex;
                flex-direction: column;
            }

            .form-label {
                font-family: var(--font-mono);
                font-size: 11px;
                text-transform: uppercase;
                color: var(--text-dim);
                margin-bottom: 12px;
                transition: color 0.3s ease;
            }

            .form-input {
                background: transparent;
                border: none;
                border-bottom: 1px solid var(--glass-stroke);
                padding: 12px 0;
                color: var(--text-main);
                font-size: 18px;
                font-family: var(--font-sans);
                outline: none;
                transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            }

            .form-input:focus {
                border-bottom-color: var(--neon-cyan);
                padding-left: 10px;
            }

            .form-group:focus-within .form-label {
                color: var(--neon-cyan);
            }

            .form-indicator {
                position: absolute;
                bottom: 0;
                left: 0;
                width: 0;
                height: 1px;
                background: var(--neon-cyan);
                box-shadow: 0 0 15px var(--neon-cyan);
                transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            }

            .form-input:focus ~ .form-indicator {
                width: 100%;
            }

            .submit-btn {
                background: transparent;
                border: 1px solid var(--neon-cyan);
                color: var(--neon-cyan);
                padding: 20px 40px;
                font-family: var(--font-mono);
                font-size: 14px;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                cursor: pointer;
                position: relative;
                overflow: hidden;
                transition: all 0.4s ease;
                margin-top: 20px;
                align-self: flex-start;
            }

            .submit-btn::before {
                content: "";
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: var(--neon-cyan);
                transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
                z-index: -1;
            }

            .submit-btn:hover {
                color: var(--bg-deep);
                box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
            }

            .submit-btn:hover::before {
                left: 0;
            }

            /* Animations */
            @keyframes reveal {
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            /* Scroll Progress Conductive Line */
            .conductive-line {
                position: absolute;
                left: 0;
                top: 0;
                width: 1px;
                height: 100%;
                background: linear-gradient(
                    to bottom,
                    transparent,
                    var(--neon-flux),
                    var(--neon-cyan),
                    transparent
                );
                opacity: 0.3;
            }

            svg#visual-filter {
                position: absolute;
                width: 0;
                height: 0;
            }
        </style>
    </head>
    <body>
        <svg id="visual-filter">
            <filter id="grain">
                <feTurbulence
                    type="fractalNoise"
                    baseFrequency="0.65"
                    numOctaves="3"
                    stitchTiles="stitch"
                />
                <feColorMatrix type="saturate" values="0" />
                <feComponentTransfer>
                    <feFuncR type="linear" slope="0.2" />
                    <feFuncG type="linear" slope="0.2" />
                    <feFuncB type="linear" slope="0.2" />
                </feComponentTransfer>
            </filter>
        </svg>

        <div class="grain-overlay" style="filter: url(#grain)"></div>

        <section class="flux-container">
            <div class="flux-bg-gradient"></div>
            <div class="conductive-line"></div>

            <div class="contact-grid">
                <div class="contact-header">
                    <h2>
                        <span>Ignite</span>
                        The Flux
                    </h2>

                    <div class="info-block">
                        <div class="info-item">
                            <span class="info-label">Direct Channel</span>
                            <a
                                href="mailto:hello@flux.studio"
                                class="info-value"
                                >hello@flux.studio</a
                            >
                        </div>
                        <div class="info-item">
                            <span class="info-label">Coordinates</span>
                            <span class="info-value">London, UK / Remote</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Vibe Check</span>
                            <a href="#" class="info-value">Instagram</a> &nbsp;
                            <a href="#" class="info-value">Dribbble</a>
                        </div>
                    </div>
                </div>

                <div class="contact-form-container">
                    <form class="contact-form">
                        <div class="form-group">
                            <label class="form-label"
                                >Transmission Origin</label
                            >
                            <input
                                type="text"
                                class="form-input"
                                placeholder="Your name"
                                required
                            />
                            <div class="form-indicator"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Return Address</label>
                            <input
                                type="email"
                                class="form-input"
                                placeholder="email@provider.com"
                                required
                            />
                            <div class="form-indicator"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Project Blueprint</label>
                            <input
                                type="text"
                                class="form-input"
                                placeholder="What are we building?"
                                required
                            />
                            <div class="form-indicator"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Details</label>
                            <textarea
                                class="form-input"
                                rows="4"
                                placeholder="Briefly describe the vision..."
                            ></textarea>
                            <div class="form-indicator"></div>
                        </div>

                        <button type="submit" class="submit-btn">
                            Initialize Link
                        </button>
                    </form>
                </div>
            </div>
        </section>

        <script>
            // Smooth scroll reveal logic or interaction feedback
            const inputs = document.querySelectorAll(".form-input");

            inputs.forEach((input) => {
                input.addEventListener("focus", () => {
                    // Potential for adding subtle sound effects or haptic feedback
                    console.log("Conductive path established");
                });
            });

            // Mouse follower for flux glow
            document.addEventListener("mousemove", (e) => {
                const x = (e.clientX / window.innerWidth) * 100;
                const y = (e.clientY / window.innerHeight) * 100;

                document.querySelector(".flux-bg-gradient").style.background = `
                radial-gradient(circle at ${x}% ${y}%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 20% 30%, rgba(0, 243, 255, 0.05) 0%, transparent 40%)
            `;
            });
        </script>
    </body>
</html>
